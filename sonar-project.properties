# Project identity
sonar.projectKey=smartproperty
sonar.projectName=SmartProperty Monorepo
sonar.projectVersion=1.0

# Source code
sonar.sources=frontend/src,backend/src,shared

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.spec.ts,**/*.test.ts

# Encoding
sonar.sourceEncoding=UTF-8

# Language settings
sonar.typescript.tsconfigPaths=frontend/tsconfig.json,backend/tsconfig.json

# Tests are ignored for now
sonar.tests=
