apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alert-rules.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    scrape_configs:
      # Prometheus self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Kubernetes nodes
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # Kubernetes pods with prometheus annotations
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

      # SmartProperty Backend
      - job_name: 'smartproperty-backend'
        metrics_path: /api/metrics
        static_configs:
          - targets: ['backend.smartproperty.svc.cluster.local:3000']
            labels:
              app: backend
              environment: production

      # SmartProperty Frontend (nginx)
      - job_name: 'smartproperty-frontend'
        metrics_path: /stub_status
        static_configs:
          - targets: ['frontend.smartproperty.svc.cluster.local:80']
            labels:
              app: frontend
              environment: production

      # MongoDB
      - job_name: 'mongodb'
        static_configs:
          - targets: ['mongodb.smartproperty.svc.cluster.local:27017']
            labels:
              app: mongodb

      # Redis
      - job_name: 'redis'
        static_configs:
          - targets: ['redis.smartproperty.svc.cluster.local:6379']
            labels:
              app: redis

      # MinIO
      - job_name: 'minio'
        metrics_path: /minio/v2/metrics/cluster
        static_configs:
          - targets: ['minio.smartproperty.svc.cluster.local:9000']
            labels:
              app: minio

  alert-rules.yml: |
    groups:
      - name: smartproperty-alerts
        rules:
          # Pod not running
          - alert: PodNotReady
            expr: kube_pod_status_ready{namespace="smartproperty"} == 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} is not ready"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been not ready for more than 2 minutes."

          # Pod restarting frequently
          - alert: PodRestartingFrequently
            expr: increase(kube_pod_container_status_restarts_total{namespace="smartproperty"}[1h]) > 3
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ $labels.pod }} is restarting frequently"
              description: "Pod {{ $labels.pod }} has restarted {{ $value }} times in the last hour."

          # High CPU usage
          - alert: HighCPUUsage
            expr: (sum(rate(container_cpu_usage_seconds_total{namespace="smartproperty"}[5m])) by (pod) / sum(container_spec_cpu_quota{namespace="smartproperty"}/container_spec_cpu_period{namespace="smartproperty"}) by (pod)) * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage on pod {{ $labels.pod }}"
              description: "Pod {{ $labels.pod }} CPU usage is above 80% for more than 5 minutes."

          # High memory usage
          - alert: HighMemoryUsage
            expr: (container_memory_working_set_bytes{namespace="smartproperty"} / container_spec_memory_limit_bytes{namespace="smartproperty"}) * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage on pod {{ $labels.pod }}"
              description: "Pod {{ $labels.pod }} memory usage is above 85% for more than 5 minutes."

          # Node disk pressure
          - alert: NodeDiskPressure
            expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.node }} has disk pressure"
              description: "Node {{ $labels.node }} is under disk pressure. Free up disk space immediately."

          # Node not ready
          - alert: NodeNotReady
            expr: kube_node_status_condition{condition="Ready",status="true"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.node }} is not ready"
              description: "Node {{ $labels.node }} has been not ready for more than 2 minutes."

          # Prometheus target down
          - alert: TargetDown
            expr: up == 0
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "Target {{ $labels.job }} is down"
              description: "Target {{ $labels.instance }} of job {{ $labels.job }} has been down for more than 3 minutes."

          # PVC almost full
          - alert: PVCAlmostFull
            expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PVC {{ $labels.persistentvolumeclaim }} is almost full"
              description: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value }}% full."
