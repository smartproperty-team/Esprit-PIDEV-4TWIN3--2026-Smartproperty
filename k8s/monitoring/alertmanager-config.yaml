apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'namespace']
      group_wait: 10s
      group_interval: 5m
      repeat_interval: 3h
      receiver: 'default'

      routes:
        - match:
            severity: critical
          receiver: 'critical'
          group_wait: 5s

        - match:
            severity: warning
          receiver: 'default'

    receivers:
      - name: 'default'
        webhook_configs:
          - url: 'http://localhost:5001/'
            send_resolved: true

      - name: 'critical'
        webhook_configs:
          - url: 'http://localhost:5001/'
            send_resolved: true

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'namespace']
